<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-check-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  :root{
    --ink:#14304A;
    --ink-dark:#0A1B2B;
    --gold:#D9A441;
    --rust:#B4552D;
    --paper:#EDE6D8;
    --paper-soft:#F5F1E8;
    --line: rgba(27,58,58,0.15);
    --white:#fff;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Tajawal', sans-serif;
    background:var(--paper-soft);
    color:var(--ink-dark);
    line-height:1.6;
  }
  h1,h2,h3,.display{
    font-family:'Tajawal', sans-serif;
    font-weight:900;
    color:var(--ink-dark);
    letter-spacing:0.3px;
  }
  .pattern-divider{
    height:3px;
    background:var(--gold);
  }
  header.site{
    background:var(--ink);
    color:var(--paper);
    padding:22px 20px 26px;
    position:relative;
  }
  header.site .top{
    display:flex; justify-content:space-between; align-items:center;
  }
  header.site .brand{
    font-size:26px;
    color:var(--paper);
  }
  header.site .brand span{ color:var(--gold); }
  nav.tabs{
    display:flex; gap:6px; margin-top:18px; flex-wrap:wrap;
  }
  nav.tabs button{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    color:var(--paper);
    padding:8px 16px;
    border-radius:999px;
    font-family:'Tajawal';
    font-size:14px;
    cursor:pointer;
    transition:.2s;
  }
  nav.tabs button.active{
    background:var(--gold);
    color:var(--ink-dark);
    border-color:var(--gold);
    font-weight:700;
  }
  .cart-btn{
    position:relative;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.25);
    color:var(--paper);
    padding:7px 14px;
    border-radius:999px;
    font-weight:700;
    font-family:'Tajawal';
    cursor:pointer;
    font-size:13px;
    transition:background .12s ease, color .12s ease;
  }
  .cart-btn:active{
    background:var(--gold);
    color:var(--ink-dark);
  }
  .cart-badge{
    position:absolute; top:-6px; left:-6px;
    background:var(--rust); color:#fff;
    border-radius:50%; width:20px; height:20px;
    font-size:11px; display:flex; align-items:center; justify-content:center;
  }
  main{ max-width:900px; margin:0 auto; padding:24px 18px 80px; }
  section{ display:none; }
  section.active{ display:block; animation:fade .3s ease; }
  @keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }

  /* HOME */
  .hero{
    text-align:center;
    padding:36px 10px 10px;
  }
  .hero .eyebrow{
    color:var(--rust); font-weight:700; letter-spacing:.5px; font-size:14px;
  }
  .hero h1{ font-size:34px; margin:10px 0 14px; color:var(--ink-dark); }
  .hero p{ max-width:520px; margin:0 auto; color:#3d4f4f; font-size:16px; }
  .hero-cta{ margin-top:22px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .btn{
    display:inline-block; padding:12px 22px; border-radius:10px;
    font-weight:700; text-decoration:none; cursor:pointer; border:none; font-family:'Tajawal'; font-size:15px;
  }
  .btn-primary{ background:var(--ink); color:var(--paper); }
  .btn-gold{ background:var(--gold); color:var(--ink-dark); }
  .btn-outline{ background:transparent; border:2px solid var(--ink); color:var(--ink); }

  .strip{
    display:flex; gap:14px; margin:34px 0; overflow-x:auto; padding-bottom:6px;
  }
  .strip .card{
    min-width:150px; background:var(--white); border-radius:14px; padding:16px;
    border:1px solid var(--line); text-align:center; flex-shrink:0;
  }
  .strip .card .num{ font-family:'Aref Ruqaa'; font-size:26px; color:var(--rust); }
  .strip .card .lbl{ font-size:13px; color:#555; margin-top:4px; }

  /* CATALOG */
  .catalog-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px;}
  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:14px; }
  .product{
    background:var(--white); border:1px solid var(--line); border-radius:14px;
    overflow:hidden; display:flex; flex-direction:column;
  }
  .product .thumb{
    height:110px; background:linear-gradient(135deg, var(--ink) 0%, var(--rust) 100%);
    display:flex; align-items:center; justify-content:center; color:var(--paper);
    font-family:'Aref Ruqaa'; font-size:34px;
    position:relative; overflow:hidden;
  }
  .product .thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .thumb-quick-btn{
    position:absolute; bottom:6px; left:6px; z-index:2;
    background:#25D366; color:#fff; border:none; border-radius:999px;
    width:32px; height:32px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 3px 8px rgba(0,0,0,.3); cursor:pointer; font-size:15px;
  }
  .thumb-video-badge{
    position:absolute; top:6px; right:6px; z-index:2;
    background:rgba(10,27,43,.75); color:#fff; font-size:11px;
    padding:3px 8px; border-radius:999px; display:flex; align-items:center; gap:3px;
  }
  .product .body{ padding:12px; display:flex; flex-direction:column; gap:6px; flex:1; }
  .product .name{ font-weight:700; font-size:15px; }
  .product .price{ color:var(--rust); font-weight:900; font-size:15px; }
  .product .add{
    margin-top:auto; background:var(--ink); color:var(--paper); border:none;
    padding:8px; border-radius:8px; font-family:'Tajawal'; font-weight:700; cursor:pointer; font-size:13px;
  }
  .empty{
    text-align:center; padding:40px 20px; color:#666; background:var(--white);
    border-radius:14px; border:1px dashed var(--line);
  }
  .video-modal-overlay{
    position:fixed; inset:0; background:rgba(10,27,43,.85); z-index:90;
    display:none; align-items:center; justify-content:center; padding:20px;
  }
  .video-modal-overlay.show{ display:flex; }
  .video-modal-overlay video{ max-width:100%; max-height:80vh; border-radius:10px; }
  .video-close{ position:absolute; top:20px; left:20px; background:#fff; border:none; border-radius:50%; width:36px; height:36px; font-size:18px; cursor:pointer; }

  /* CART DRAWER */
  .overlay{
    position:fixed; inset:0; background:rgba(15,38,38,.5); display:none; z-index:40;
  }
  .overlay.show{ display:block; }
  .drawer{
    position:fixed; top:0; bottom:0; left:0; width:min(360px, 88%);
    background:var(--white); z-index:50; transform:translateX(-100%);
    transition:transform .25s ease; display:flex; flex-direction:column; padding:20px;
  }
  .drawer.show{ transform:translateX(0); }
  .drawer h3{ font-size:22px; margin-bottom:14px; }
  .cart-items{ flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
  .cart-item{ display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--line); padding-bottom:10px; }
  .cart-item .name{ font-weight:700; font-size:14px; }
  .cart-item .qty{ display:flex; align-items:center; gap:6px; margin-top:4px; }
  .cart-item .qty button{ background:var(--paper); border:1px solid var(--line); width:24px; height:24px; border-radius:6px; cursor:pointer; }
  .cart-total{ font-weight:900; font-size:18px; margin:14px 0; text-align:center; }
  .close-drawer{ align-self:flex-start; background:none; border:none; font-size:22px; cursor:pointer; color:var(--ink-dark); }

  /* TRACK */
  .track-box{ background:var(--white); border:1px solid var(--line); border-radius:16px; padding:22px; text-align:center; }
  .my-mark-box{ background:var(--ink); color:var(--paper); border-radius:16px; padding:20px; margin-bottom:16px; text-align:center; }
  .mark-display{
    font-family:'Aref Ruqaa'; font-size:26px; color:var(--gold); letter-spacing:1px;
    background:rgba(255,255,255,0.08); border-radius:10px; padding:10px; margin-top:6px;
  }
  .track-box input{
    width:100%; padding:12px; border-radius:10px; border:1px solid var(--line);
    font-family:'Tajawal'; font-size:15px; margin:14px 0; text-align:center;
  }
  .order-result{ margin-top:18px; text-align:right; background:var(--paper-soft); border-radius:12px; padding:16px; display:none; }
  .order-result.show{ display:block; }
  .status-pill{ display:inline-block; padding:5px 14px; border-radius:999px; font-weight:700; font-size:13px; background:var(--gold); color:var(--ink-dark); }

  /* ADMIN */
  .admin-lock{ background:var(--white); border:1px solid var(--line); border-radius:16px; padding:24px; text-align:center; max-width:320px; margin:0 auto; }
  .admin-lock input{ width:100%; padding:10px; text-align:center; border-radius:8px; border:1px solid var(--line); margin:12px 0; font-family:'Tajawal'; }
  .admin-section{ background:var(--white); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:16px; }
  .admin-section h3{ font-size:18px; margin-bottom:10px; }
  .admin-row{ display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
  .admin-row input, .admin-row select{ padding:8px; border-radius:8px; border:1px solid var(--line); font-family:'Tajawal'; flex:1; min-width:100px; }
  .admin-list-item{ display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--line); font-size:14px; gap:8px; flex-wrap:wrap; }
  .admin-order-item{ padding:12px 0; border-bottom:1px solid var(--line); font-size:13.5px; }
  .admin-order-item select{ width:100%; padding:7px; border-radius:8px; border:1px solid var(--line); font-family:'Tajawal'; }
  .admin-order-item input{ padding:7px; border-radius:8px; border:1px solid var(--line); font-family:'Tajawal'; flex:1; min-width:120px; }
  .tiny-btn{ background:var(--rust); color:#fff; border:none; padding:5px 10px; border-radius:6px; font-size:12px; cursor:pointer; }
  .tiny-btn.gold{ background:var(--gold); color:var(--ink-dark); }

  footer{ text-align:center; padding:24px; color:#5c6b6b; font-size:13px; }
  .footer-link{ cursor:pointer; text-decoration:underline; }

  /* GLOSSARY */
  .term-card{ background:var(--white); border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:20px; }
  .term-head{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .term-badge{ background:var(--ink); color:var(--gold); font-family:'Aref Ruqaa'; font-size:18px; padding:4px 14px; border-radius:8px; }
  .term-card h3{ font-size:18px; color:var(--ink-dark); }
  .term-card p{ margin-bottom:10px; font-size:14.5px; }
  .formula-box{ background:var(--paper-soft); border-radius:12px; padding:14px 16px; margin:14px 0; text-align:center; }
  .formula-title{ font-size:12px; color:var(--rust); font-weight:700; margin-bottom:6px; }
  .formula{ font-family:'Aref Ruqaa'; font-size:18px; color:var(--ink-dark); }
  .formula-sub{ font-size:12.5px; color:#666; margin-top:6px; }
  .cbm-diagram{ background:var(--paper-soft); border-radius:12px; padding:10px; margin:14px 0; }
  .calc-box{ background:var(--paper-soft); border-radius:12px; padding:16px; margin:16px 0; }
  .calc-title{ font-weight:700; margin-bottom:10px; }
  .calc-row{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .calc-row label{ font-size:12px; color:#555; display:block; margin-bottom:4px; }
  .calc-row input{ width:100%; padding:9px; border-radius:8px; border:1px solid var(--line); font-family:'Tajawal'; }
  .calc-result{ margin-top:12px; font-size:14px; display:none; background:var(--white); border-radius:10px; padding:12px; }
  .calc-result.show{ display:block; }
  .calc-result .big{ font-family:'Aref Ruqaa'; font-size:22px; color:var(--rust); }
  .ref-table{ width:100%; border-collapse:collapse; margin-top:14px; font-size:14px; }
  .ref-table th, .ref-table td{ border:1px solid var(--line); padding:8px; text-align:center; }
  .ref-table th{ background:var(--ink); color:var(--paper); }
  .price-box{ background:var(--ink); color:var(--paper); border-radius:14px; padding:16px 18px; margin:16px 0; }
  .price-title{ font-weight:700; margin-bottom:10px; color:var(--gold); }
  .price-row{ display:flex; justify-content:space-between; padding:6px 0; font-size:14.5px; }
  .price-note{ font-size:12px; color:rgba(237,230,216,.7); margin-bottom:8px; }

  /* ABOUT */
  .about-hero{ text-align:center; padding:20px 10px; }
  .about-photo{
    width:120px; height:120px; border-radius:50%; margin:0 auto 14px;
    background:linear-gradient(135deg, var(--ink) 0%, var(--rust) 100%);
    display:flex; align-items:center; justify-content:center; overflow:hidden;
    font-family:'Aref Ruqaa'; font-size:42px; color:var(--paper);
    border:3px solid var(--gold);
  }
  .about-photo img{ width:100%; height:100%; object-fit:cover; }
  .about-role{ color:var(--rust); font-weight:700; font-size:14px; margin-top:4px; }
  .about-stats{ display:flex; gap:12px; justify-content:center; margin:24px 0; flex-wrap:wrap; }
  .about-stat{
    background:var(--white); border:1px solid var(--line); border-radius:14px;
    padding:16px 22px; text-align:center; min-width:100px;
  }
  .about-stat .num{ font-family:'Aref Ruqaa'; font-size:26px; color:var(--rust); }
  .about-stat .lbl{ font-size:12px; color:#555; margin-top:4px; }
  .about-bio{
    background:var(--white); border:1px solid var(--line); border-radius:16px;
    padding:22px; font-size:15px; line-height:1.9; white-space:pre-line;
    max-width:600px; margin:0 auto;
  }

  /* CRANE LOADER */
  #craneLoader{
    position:fixed; top:14px; left:50%; transform:translateX(-50%) translateY(-14px);
    background:var(--ink); border-radius:14px; padding:8px 16px 6px;
    display:flex; align-items:center; gap:8px; z-index:100;
    opacity:0; pointer-events:none; transition:opacity .18s ease, transform .18s ease;
    box-shadow:0 6px 18px rgba(10,27,43,.35);
  }
  #craneLoader.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  #craneLoader svg{ display:block; }
  #craneLoader .txt{ color:var(--paper); font-size:12px; font-weight:700; }
  .crane-hook{ animation:hookMove 0.9s ease-in-out infinite; transform-origin:170px 40px; }
  .crane-box{ animation:boxMove 0.9s ease-in-out infinite; }
  @keyframes hookMove{
    0%{ transform:translateY(0) rotate(0deg); }
    50%{ transform:translateY(10px) rotate(-3deg); }
    100%{ transform:translateY(0) rotate(0deg); }
  }
  @keyframes boxMove{
    0%{ transform:translate(0,0); }
    50%{ transform:translate(-14px,10px); }
    100%{ transform:translate(0,0); }
  }
  @media (prefers-reduced-motion: reduce){
    .crane-hook, .crane-box{ animation:none; }
  }

  /* WHATSAPP FLOAT BUTTON */
  #waFloat{
    position:fixed; bottom:22px; right:22px; z-index:45;
    width:58px; height:58px; border-radius:50%;
    background:#25D366; display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 16px rgba(0,0,0,.25); text-decoration:none;
    animation:waPulse 2.4s ease-in-out infinite;
  }
  #waFloat svg{ width:30px; height:30px; }
  #currencyFloat{
    position:fixed; bottom:22px; left:22px; z-index:45;
    width:52px; height:52px; border-radius:50%;
    background:var(--gold); color:var(--ink-dark); border:none;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 16px rgba(0,0,0,.25); cursor:pointer; font-size:24px;
  }
  @keyframes waPulse{
    0%,100%{ box-shadow:0 6px 16px rgba(37,211,102,.4); }
    50%{ box-shadow:0 6px 22px rgba(37,211,102,.75); }
  }

  /* AUTH */
  .auth-area{ display:flex; align-items:center; gap:8px; }
  .auth-btn{
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.25);
    color:var(--paper); padding:7px 14px; border-radius:999px; font-family:'Tajawal';
    font-size:13px; cursor:pointer;
  }
  .logout-btn{
    background:var(--rust); border-color:var(--rust); color:#fff; font-weight:700;
  }
  .auth-modal-overlay{
    position:fixed; inset:0; background:rgba(10,27,43,.55); z-index:70;
    display:none; align-items:center; justify-content:center; padding:20px;
  }
  .auth-modal-overlay.show{ display:flex; }
  .auth-modal{
    background:var(--white); border-radius:16px; padding:28px; width:100%; max-width:400px;
  }
  .auth-modal h3{ text-align:center; margin-bottom:4px; }
  .password-wrap{ position:relative; margin-bottom:10px; }
  .password-wrap input{ margin-bottom:0; padding-left:40px; }
  .toggle-pw-btn{
    position:absolute; left:8px; top:50%; transform:translateY(-50%);
    background:none; border:none; cursor:pointer; font-size:16px; padding:4px; opacity:0.6;
  }
  .auth-tabs{ display:flex; gap:8px; margin:14px 0; }
  .auth-tabs button{
    flex:1; padding:8px; border-radius:8px; border:1px solid var(--line); background:var(--paper-soft);
    font-family:'Tajawal'; cursor:pointer; font-size:14px;
  }
  .auth-tabs button.active{ background:var(--ink); color:var(--paper); }
  .auth-modal input{
    width:100%; padding:11px; border-radius:8px; border:1px solid var(--line);
    font-family:'Tajawal'; margin-bottom:10px;
  }
  .auth-modal .err{ color:var(--rust); font-size:13px; margin-bottom:8px; display:none; }
  .auth-modal .err.show{ display:block; }
  .auth-close{ display:block; margin:10px auto 0; background:none; border:none; color:#777; cursor:pointer; font-size:13px; }
  .link-btn{
    display:block; margin:10px auto 0; background:none; border:none; color:var(--ink);
    text-decoration:underline; cursor:pointer; font-family:'Tajawal'; font-size:13px;
  }
  .info-modal-overlay{
    position:fixed; inset:0; background:rgba(10,27,43,.6); z-index:95;
    display:none; align-items:center; justify-content:center; padding:20px;
  }
  .info-modal-overlay.show{ display:flex; }
  .info-modal{
    background:var(--white); border-radius:16px; padding:26px 22px; max-width:440px;
    max-height:80vh; overflow-y:auto; position:relative; font-size:14.5px; line-height:1.9;
  }

  /* QUESTIONS PAGE */
  .ask-box{ background:var(--white); border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:20px; }
  .import-row{ display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; align-items:center; padding-bottom:10px; border-bottom:1px dashed var(--line); }
  .import-row input{ padding:9px; border-radius:8px; border:1px solid var(--line); font-family:'Tajawal'; flex:1; min-width:110px; }
  .import-row input.qty-input{ flex:0 0 80px; }
  .import-row .remove-row{ background:var(--rust); color:#fff; border:none; border-radius:8px; width:32px; height:32px; cursor:pointer; flex-shrink:0; }
  .ask-box textarea{
    width:100%; min-height:80px; padding:11px; border-radius:8px; border:1px solid var
